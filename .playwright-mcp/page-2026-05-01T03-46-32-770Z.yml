            - generic [ref=e226]:
              - text: OpenClaw is a
              - strong [ref=e227]: self-hosted gateway
              - text: that connects your favorite chat apps and channel surfaces — built-in channels plus bundled or external channel plugins such as Discord, Google Chat, iMessage, Matrix, Microsoft Teams, Signal, Slack, Telegram, WhatsApp, Zalo, and more — to AI coding agents like Pi. You run a single Gateway process on your own machine (or a server), and it becomes the bridge between your messaging apps and an always-available AI assistant.
            - generic [ref=e228]:
              - strong [ref=e229]: Who is it for?
              - text: Developers and power users who want a personal AI assistant they can message from anywhere — without giving up control of their data or relying on a hosted service.
            - strong [ref=e231]: What makes it different?
            - list [ref=e232]:
              - listitem [ref=e233]:
                - strong [ref=e234]: Self-hosted
                - text: ": runs on your hardware, your rules"
              - listitem [ref=e235]:
                - strong [ref=e236]: Multi-channel
                - text: ": one Gateway serves built-in channels plus bundled or external channel plugins simultaneously"
              - listitem [ref=e237]:
                - strong [ref=e238]: Agent-native
                - text: ": built for coding agents with tool use, sessions, memory, and multi-agent routing"
              - listitem [ref=e239]:
                - strong [ref=e240]: Open source
                - text: ": MIT licensed, community-driven"
            - generic [ref=e241]:
              - strong [ref=e242]: What do you need?
              - text: Node 24 (recommended), or Node 22 LTS (
              - code [ref=e243]: 22.14+
              - text: ) for compatibility, an API key from your chosen provider, and 5 minutes. For best quality and security, use the strongest latest-generation model available.
